name: Infrastructure CI

on:
  pull_request:
    branches: [main]

# Global environment variables available to all jobs
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-west-2
  TF_TOKEN_app_terraform_io: ${{ secrets.TFC_API_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Creates a physical credential file on the runner to fix 'terraform test' errors
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false # Disabled to prevent interference with test sub-processes

      - name: Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        # chdir is required so init happens where your provider config lives
        run: terraform -chdir=modules/services/webserver-cluster init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=modules/services/webserver-cluster validate

      - name: Unit Tests
        # This will now find the credentials initialized in the step above
        run: terraform -chdir=modules/services/webserver-cluster test

  plan:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform -chdir=modules/services/webserver-cluster init

      - name: Terraform Plan
        run: terraform -chdir=modules/services/webserver-cluster plan -out=ci.tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: modules/services/webserver-cluster/ci.tfplan
